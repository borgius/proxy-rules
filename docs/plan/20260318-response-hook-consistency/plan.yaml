plan_id: 20260318-response-hook-consistency
objective: Ensure `onResponse` runs for every matched HTTP response even when a rule also defines `modifyResponseBody`, while keeping `modifyResponseBody` limited to eligible buffered text responses and adding regression tests for fallback/empty-body cases.
created_at: 2026-03-18T00:00:00Z
created_by: GitHub Copilot (GPT-5.4) / gem-planner
status: pending_approval
research_confidence: high

tldr: |
  Current state: any HTTP rule with `modifyResponseBody` is routed through `runResponsePipeline()`, but that pipeline only invokes `onResponse` after successful full-body buffering and mutation. If the response is non-bufferable, falls back to passthrough after exceeding the byte limit, or finishes with an empty buffered body, the client still gets a response but `onResponse` never runs.
  Target state: `runResponsePipeline()` should treat response observation and body mutation as separate concerns. `onResponse` must run exactly once for every matched upstream response that reaches the proxy, while `modifyResponseBody` continues to run only for buffered text responses that satisfy the existing eligibility checks.
  Delivery focus: implement the fix in the response pipeline without changing rule-matching semantics, preserve passthrough/streaming behavior for ineligible responses, and add focused tests that lock the previously skipped branches.

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: The fix accidentally forces buffering or mutation for responses that should remain streamed through unchanged, causing memory growth or response corruption on binary/compressed payloads.
      likelihood: medium
      impact: high
      mitigation: Keep the existing `canBuffer` gate intact, separate the `onResponse` call from `modifyResponseBody`, and add regression tests for non-text and over-limit fallback branches.
    - scenario: `onResponse` fires twice for the same request because both the passthrough/fallback path and the buffered completion path invoke it.
      likelihood: medium
      impact: high
      mitigation: Introduce one request-scoped response finalization path in `runResponsePipeline()` with an explicit once-only guard, then cover fallback and successful buffered mutation with ordered event assertions.
    - scenario: Logging timing diverges between shared passthrough and pipeline branches, so matched-rule traffic is no longer reported consistently.
      likelihood: low
      impact: medium
      mitigation: Preserve the existing log payload shape and emit the final pipeline log from the same branch that owns `onResponse` completion.
  assumptions:
    - The required behavior change applies only after an upstream `proxyRes` exists; requests short-circuited earlier by `onRequest` remain unchanged.
    - `modifyResponseBody` should remain opt-in and should not run for empty, non-text, compressed, or over-limit responses unless they were already eligible buffered text payloads.
    - The registry and request matching logic are already correct for this bug; the missed hook execution is isolated to the response pipeline branch.

implementation_specification:
  code_structure: |
    Keep request matching and branch selection in `src/proxy/http-handler.ts` unchanged. Concentrate the fix inside `src/proxy/response-pipeline.ts` by separating three responsibilities that are currently tangled together: deciding whether body mutation is allowed, invoking `onResponse`, and emitting the final response/logging behavior. Prefer a small internal helper or closure in the pipeline file rather than broad API changes.
  affected_areas:
    - src/proxy/response-pipeline.ts
    - tests/response-pipeline.test.ts
    - tests/proxy-logging.test.ts
  component_details:
    - component: Pipeline response finalization
      responsibility: Ensure every matched upstream response in the isolated pipeline invokes `onResponse` exactly once before the response is considered complete, regardless of whether body mutation is skipped, succeeds, or falls back to passthrough.
      interfaces:
        - "`runResponsePipeline()` continues to accept the current parameters and return `void`."
        - "A request-scoped helper or guarded closure owns one-time `onResponse` invocation and final log emission."
    - component: Body-mutation eligibility gate
      responsibility: Preserve the existing content-type, content-encoding, and size checks so `modifyResponseBody` only runs for eligible buffered text responses.
      interfaces:
        - "The `canBuffer` decision remains the gate for full-body buffering and mutation."
        - "Fallback-to-passthrough still streams the original upstream bytes without attempting mutation."
    - component: Regression coverage
      responsibility: Add focused tests for the branches that currently miss `onResponse`, including ineligible responses, fallback/over-limit behavior, and empty-body completion.
      interfaces:
        - "Tests assert hook ordering and one-time invocation, not just final HTTP status/body."
        - "Logging coverage verifies that matched requests still emit proxy-layer start/finish records after the fix."
  dependencies:
    - component: Pipeline response finalization
      relationship: Depends on the current `proxy.once('proxyRes')` flow and must remain compatible with request-scoped isolated proxies.
    - component: Regression coverage
      relationship: Depends on the final control-flow split implemented in `response-pipeline.ts`.
  integration_points:
    - Response handling inside `src/proxy/response-pipeline.ts`
    - Live proxy integration coverage in `tests/response-pipeline.test.ts`
    - Built-in traffic logging checks in `tests/proxy-logging.test.ts`

