patterns_found:
  - category: architecture
    pattern: HTTP request handling resolves the effective rule before any built-in traffic logging
    description: The request handler must obtain `{ domain, url, rule }` from `resolveHttpRule()` before it can emit request logs or register proxy listeners.
    examples:
      - file: src/proxy/http-handler.ts
        location: src/proxy/http-handler.ts:42-55
        snippet: const resolvedRule = await registry.resolveHttpRule(rawHost, req); ... if (rule) { logger.info("→ HTTP", ...) }
      - file: src/plugins/plugin-registry.ts
        location: src/plugins/plugin-registry.ts:221-227
        snippet: async resolveHttpRule(...) { ... const url = buildRequestUrl(req); ... }
    prevalence: common

  - category: error_handling
    pattern: Shared URL reconstruction assumes runtime Node request shape
    description: `buildRequestUrl()` relies on `req.socket.encrypted` without guarding for mock objects cast to `IncomingMessage`.
    examples:
      - file: src/plugins/context-helpers.ts
        location: src/plugins/context-helpers.ts:10-14
        snippet: `${(req.socket as { encrypted?: boolean }).encrypted ? "https" : "http"}://...`
      - file: tests/proxy-logging.test.ts
        location: tests/proxy-logging.test.ts:114-123
        snippet: handleHttpRequest({ headers: { host: "monitored.internal" }, method: "GET", url: "/status" } as http.IncomingMessage, ...)
    prevalence: occasional

  - category: testing
    pattern: Lightweight logging tests use structural casts instead of fully constructed `IncomingMessage` objects
    description: The logging tests intentionally pass minimal plain objects to isolate logging behavior and avoid live sockets.
    examples:
      - file: tests/proxy-logging.test.ts
        location: tests/proxy-logging.test.ts:96-123
        snippet: { headers: { host: ... }, method: "GET", url: "/status" } as http.IncomingMessage
      - file: tests/context-helpers.test.ts
        location: tests/context-helpers.test.ts:16-28
        snippet: const req = new http.IncomingMessage(createServer().listen(0) as never);
    prevalence: occasional

