plan_id: 20260318-release-fix
objective: Fix the current failing release caused by tests/proxy-logging.test.ts and then rerun `nr release`
focus_area: release_failure_proxy_logging
created_at: '2026-03-18T00:00:00Z'
created_by: GitHub Copilot gem-researcher
status: completed

tldr: |
  - The failing HTTP logging test enters `handleHttpRequest()`, but execution rejects before any traffic log is emitted because `PluginRegistry.resolveHttpRule()` calls `buildRequestUrl()` and that helper dereferences `req.socket.encrypted` on a mock request that has no `socket`.
  - The exact runtime path is `tests/proxy-logging.test.ts` → `handleHttpRequest()` → `registry.resolveHttpRule(rawHost, req)` → `buildRequestUrl(req)`; the request logger (`"→ HTTP"`) and response logger (`"← HTTP"`) both sit after that failure point.
  - The safest minimal fix is to harden `buildRequestUrl()` against a missing runtime `req.socket` while preserving current behavior for absolute URLs, CONNECT-decrypted HTTPS requests, and relative HTTP requests.
  - Before rerunning `nr release`, verify the focused logging test passes without unhandled rejections and that shared URL-reconstruction behavior still passes its helper and rule-resolution coverage.

