tldr: |
  The release is currently blocked by `tests/proxy-logging.test.ts`, where synthetic HTTP requests omit `req.socket` and `buildRequestUrl()` dereferences `req.socket.encrypted` while constructing an absolute URL for logging helpers.
  The narrowest safe fix is to make URL reconstruction tolerate missing sockets and fall back to plain HTTP semantics for socket-less test requests, then verify the logging regression with a focused test run before retrying the full `nr release` flow.
  Rollback posture: keep the change isolated to request URL reconstruction and its direct verification path so it can be reverted without affecting rule discovery, proxy routing, or release packaging behavior.

open_questions:
  - None; the failure mode, fix seam, and verification path are already identified.

