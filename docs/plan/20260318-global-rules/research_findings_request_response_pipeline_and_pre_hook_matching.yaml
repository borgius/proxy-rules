  request_context_available_for_match:
    available_before_hooks:
      - req: original `http.IncomingMessage`
      - req_url: raw `req.url`, which may be absolute on plain forward-proxy HTTP and relative after CONNECT decryption
      - host_header: `req.headers.host`
      - domain: normalized hostname derived from host/authority using `extractHostname()` + `normalizeHostname()`
      - transport_hint: `(req.socket as { encrypted?: boolean }).encrypted` is already used by `buildReqUrl()` to infer scheme
    existing_absolute_url_logic:
      location: src/plugins/context-helpers.ts:10
      note: `buildReqUrl()` reconstructs an absolute URL from relative requests using host header and transport scheme; this is the closest existing URL-normalization logic for match evaluation.
    context_limitations:
      - `proxyReq` does not exist yet at the earliest HTTP match point.
      - `proxyRes` does not exist before upstream response handling.
      - CONNECT matching currently has `authority`/`hostname` at tunnel time, not a full decrypted request URL.

  safe_insertion_points_before_normal_hooks:
    preferred_http_insertion_point:
      location: src/proxy/http-handler.ts, after lines 38-41 and before line 50
      reason: At this point `rawHost`, `hostname`, `domain`, and the resolved host rule are known, while `resolveTarget`, request-body prebuffering, response-pipeline branching, and proxy event listener registration have not yet run.
      guarded_behaviors_if_inserted_here:
        - resolveTarget
        - modifyRequestBody prebuffering decisions
        - shared-path onRequest/onResponse hook registration
        - pipeline-path onRequest/modifyRequestBody/modifyResponseBody/onResponse execution
    secondary_http_insertion_point:
      location: src/proxy/http-handler.ts, immediately before the `if (rule?.modifyResponseBody)` branch at line 105
      reason: Still prevents both HTTP hook paths from running, but occurs after `resolveTarget` and any request-body prebuffering, so it is later than necessary.
    less_safe_duplication_point:
      location: src/proxy/response-pipeline.ts, function entry before `proxy.once("proxyReq", ...)`
      reason: Would gate the isolated pipeline path, but would duplicate HTTP matching logic and would not cover shared-path hook execution or earlier `resolveTarget` work.
    non_http_paths:
      - CONNECT: host rule resolution happens in `handleConnect()` before `onConnect`; there is no full request URL yet.
      - WebSocket: host rule resolution happens in `handleWebSocketUpgrade()` before WS hooks; request URL exists for upgrade requests but current path is host-only and separate from HTTP hook flow.

  likely_type_interface_changes:
    rule_contract:
      - `ProxyRule` would need a new match-related field to represent string, `RegExp`, sync function, or async function forms.
      - A dedicated request-match context type would likely be needed because existing `RequestContext` requires `proxyReq`, which is unavailable at the earliest safe HTTP insertion point.
    discovery_registry_shapes:
      - `DiscoveredPlugin` and/or registry storage would likely need to distinguish host-scoped plugins from global URL-matched plugins, because current discovery maps folder/file name directly to `domain` and current registry only resolves exact host strings.
      - A request-aware resolution API would likely be needed in addition to or instead of `resolve(rawHost)` for HTTP request handling.
    composition_surface:
      - Any combined result for host rule + matched globals would likely need to flow into both `handleHttpRequest()` and `runResponsePipeline()` as one effective rule object to avoid divergent hook behavior.

  risks_and_edge_cases:
    - risk: `rules/global` is currently just another folder name to discovery logic; without special handling it would load as domain `global`, not as a special URL-matched rule namespace.
      evidence: src/plugins/discover-plugins.ts:145 scans each top-level folder/file and assigns `domain = entry`.
    - risk: `PluginRegistry.resolve()` only accepts a raw host/authority string and cannot evaluate URL-based request matchers.
      evidence: src/plugins/plugin-registry.ts:69.
    - risk: `mergeRules()` composes `onRequest` but discards each hook's return value, so `StaticResponse` short-circuit behavior would be lost if global and domain rules are combined through current composition logic.
      evidence: src/plugins/discover-plugins.ts:70-72 only await each function and return nothing.
    - risk: `mergeRules()` does not merge `resolveTarget` or `modifyRequestBody`, so using existing folder-composition semantics for global+domain layering would omit those behaviors.
      evidence: src/plugins/discover-plugins.ts:53-109 only merges target, priority, logging, selected hooks, and `modifyResponseBody`.
    - risk: Request URL form differs by transport path; plain HTTP may already be absolute, while HTTPS MITM re-enters `handleHttpRequest()` with relative paths and injected host header.
      evidence: src/proxy/http-handler.ts:25-26 and src/proxy/connect-handler.ts:105-106.
    - risk: Matching after `resolveTarget` or prebuffering would allow non-matched global rules to still influence performance or routing decisions.
    - risk: CONNECT and WebSocket paths have separate hook entry points and different available context, so HTTP URL-based matching semantics may not transfer directly.

open_questions:
  - question: What is the exact string-match semantic for the new `match` form?
    context: The objective requires string support, but the current codebase has no URL matcher precedent indicating exact, prefix, substring, or glob-style behavior.
  - question: Should global rules participate only in HTTP/HTTPS request hooks, or also in CONNECT and WebSocket lifecycle hooks?
    context: Current CONNECT and WebSocket flows resolve rules independently and do not have the same request URL semantics as HTTP hooks.
  - question: What ordering should apply when both a host rule and one or more global rules match?
    context: Current registry ordering is priority-based for exact host resolution, while folder composition order is alphabetical with `index.*` first.
  - question: Should match evaluation use the raw `req.url` or a reconstructed absolute URL?
    context: Decrypted CONNECT requests can have relative paths, while the objective describes matching against the request URL.

gaps:
  - area: Global rule namespace behavior
    description: No existing code or tests describe how `rules/global` should be discovered, loaded, or ordered relative to host-specific rules.
    impact: Discovery and composition semantics for the feature remain undefined in the current codebase.
  - area: Rule composition return semantics
    description: Existing tests do not cover composed `onRequest` hooks returning `StaticResponse`, nor composition of `resolveTarget` / `modifyRequestBody`.
    impact: Combining global and host rules through current merge utilities has unverified and potentially incorrect behavior.
  - area: Transport-specific URL matching expectations
    description: There are no tests or docs specifying whether URL matching should be absolute, relative, normalized, or protocol-aware across HTTP, HTTPS MITM, and WebSocket upgrades.
    impact: Matching semantics could diverge across request paths unless explicitly defined.