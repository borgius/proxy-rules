related_conventions:
  naming_patterns_in_domain: Transport handlers are named by protocol phase (`handleHttpRequest`, `handleConnect`, `handleWebSocketUpgrade`); rule hooks are named by lifecycle phase (`onRequest`, `onResponse`, `modifyResponseBody`, `onConnect`).
  structure_of_domain: Host-based resolution happens first, then request handling branches by transport/proxy mode; helper utilities for reconstructing or serializing requests live under `src/plugins`.
  error_handling_in_domain: Hook failures are logged and generally do not abort the request unless transport setup itself fails; proxy errors return 502 when possible.
  testing_in_domain: Tests currently emphasize exact host resolution and end-to-end response-pipeline behavior rather than combinatorial rule-merging semantics.
  documentation_in_domain: README and inline JSDoc describe hook contracts and request/response lifecycle; `AGENTS.md` documents response-context helpers.

