plan_id: 20260318-global-rules
objective: add support for global rules in rules/global whose match function can be string, RegExp, sync function, or async function and should return true when the request URL matches
focus_area: request/response pipeline and where request matching should happen before running hooks
created_at: 2026-03-18T00:00:00Z
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - HTTP request handling is split between `handleHttpRequest()` (`src/proxy/http-handler.ts:28`) and `runResponsePipeline()` (`src/proxy/response-pipeline.ts:79`); both execute request/response hooks after host-based rule resolution via `PluginRegistry.resolve()`.
  - Current rule selection is hostname-only (`src/plugins/plugin-registry.ts:69`), so a `rules/global` folder would not participate in request matching unless discovery/registry APIs are extended beyond exact domain lookup.
  - The best HTTP insertion point for URL-based global matching is in `handleHttpRequest()` after host/domain normalization and before `resolveTarget`, request-body prebuffering, pipeline branching, or shared-proxy listener registration.
  - The request data already available before hooks is sufficient to evaluate a global URL match: `req`, `req.url`, `req.headers.host`, normalized `domain`, and reconstructable absolute URL semantics from `buildReqUrl()` (`src/plugins/context-helpers.ts:10`).
  - Composition has important existing constraints: `mergeRules()` composes `onRequest`/`onResponse`/`onConnect` but does not preserve `onRequest` return values and does not merge `resolveTarget` or `modifyRequestBody`, which is a material risk for any global+domain combination strategy.

