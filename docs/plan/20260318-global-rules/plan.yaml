plan_id: 20260318-global-rules
objective: Add support for HTTP-global rules stored in `rules/global` that are evaluated for every request and run alongside existing per-domain rules when their matcher passes.
created_at: 2026-03-18T00:00:00Z
created_by: GitHub Copilot (GPT-5.4) / gem-planner
status: pending_approval
research_confidence: high

tldr: |
  Current state: rule discovery and runtime selection are domain-only. `discoverPlugins()` loads `rules/<domain>` entries, `PluginRegistry.resolve()` returns one synchronous hostname match, and HTTP request handling runs hooks from that single rule.
  Target state: `rules/global` becomes a dedicated namespace of HTTP-global rules. For each HTTP request, the runtime reconstructs the request URL, evaluates global matchers (string, RegExp, sync function, async function), composes every matched global rule with the existing per-domain rule, and executes the combined hooks without regressing current domain-only, CONNECT, WebSocket, or hot-reload behavior.
  Rollback posture: keep the existing synchronous domain resolver intact for non-HTTP callers and isolate new global discovery/composition behind dedicated APIs so the feature can be reverted by removing the HTTP-global path without disturbing host-only behavior.

open_questions:
  - Confirm the final precedence rule for conflicting `target`, `resolveTarget`, and body modifiers; this plan assumes matched globals run first and the domain rule runs last so domain-specific behavior stays most authoritative.
  - Confirm whether a global rule without `match` should apply to every HTTP request; this plan assumes yes because the matcher is optional (`may define`).
  - Confirm the exact supported layout inside `rules/global`; this plan assumes each immediate child file or child folder represents one global rule.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Cross-rule composition changes `onRequest` semantics and drops a returned `StaticResponse` or runs later hooks after a short-circuit.
      likelihood: medium
      impact: critical
      mitigation: Introduce a dedicated effective-rule composer for runtime composition, add explicit static-response regression tests, and avoid reusing the current loader-time `mergeRules()` for cross-rule chaining.
    - scenario: Async global matching leaks into CONNECT/WebSocket paths and forces broad async API churn or breaks interception decisions.
      likelihood: low
      impact: high
      mitigation: Keep `PluginRegistry.resolve(rawHost)` unchanged for domain-only consumers and add a separate async HTTP-only resolution method.
    - scenario: `rules/global` hot reload or discovery ordering is nondeterministic, causing flaky behavior between reloads.
      likelihood: medium
      impact: medium
      mitigation: Define deterministic ordering (priority first, then stable discovery order/name), extend watcher tests to include global-rule changes, and log both domain and global rule counts after reload.
  assumptions:
    - Global matching is in scope for HTTP request handling only; decrypted HTTPS traffic participates through the existing CONNECT -> HTTP path.
    - Existing domain-folder merge semantics remain unchanged; richer multi-rule composition happens after discovery at HTTP request resolution time.
    - The full request URL used for matcher evaluation should be reconstructed consistently for absolute-proxy requests and decrypted relative-path requests.
    - Existing public rule authoring for `rules/<domain>` remains backward compatible.

current_state: |
  - Rules are discovered from the active rules directory by folder/file name, producing a single `ProxyRule` per domain.
  - Hostname normalization and lookup live in `src/plugins/plugin-registry.ts`, and callers currently receive `ProxyRule | null` synchronously.
  - `src/proxy/http-handler.ts` resolves one rule before `resolveTarget`, request-body buffering, and the response-pipeline split.
  - `src/proxy/response-pipeline.ts` and the shared passthrough path assume the resolved rule already contains the complete hook set.
  - Hot reload swaps the registry atomically by rediscovering all rules from disk.

target_state: |
  - `rules/global` is treated as a dedicated namespace of HTTP-global rules, each with an optional matcher.
  - The registry exposes an async HTTP resolution/composition path that evaluates all global matchers against the reconstructed request URL and returns one effective rule for that request.
  - Matched global hooks run together with the per-domain rule in a deterministic order across passthrough and response-pipeline flows.
  - Host-only resolution for CONNECT and WebSocket remains intact unless a future requirement expands global behavior beyond HTTP.
  - Tests and docs describe `rules/global`, matcher semantics, ordering, hot reload, and backward compatibility.

