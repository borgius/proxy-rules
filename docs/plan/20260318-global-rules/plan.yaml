rollback_notes:
  - The safest rollback is to remove the async HTTP-global resolution path and restore `handleHttpRequest()` to `registry.resolve(rawHost)`, leaving CONNECT/WebSocket untouched.
  - Keep loader-time domain composition (`mergeRules()`) unchanged so rollback does not need to unwind existing per-domain semantics.
  - Avoid changing config-path resolution or watcher entry points beyond what is necessary for the new discovery payload so the feature can be reverted with a small patch set.

implementation_specification:
  code_structure: |
    Preserve the current layering: discovery loads rule definitions from disk, the registry owns lookup/composition policy, and proxy handlers consume an already-resolved effective rule. Add HTTP-global support by extending discovery metadata and introducing a dedicated async HTTP resolver/composer instead of making every existing call site asynchronous.
  affected_areas:
    - src/plugins/types.ts
    - src/plugins/discover-plugins.ts
    - src/plugins/plugin-registry.ts
    - src/plugins/context-helpers.ts
    - src/proxy/http-handler.ts
    - src/watch/watch-config-and-rules.ts
    - tests/plugins.test.ts
    - tests/response-pipeline.test.ts
    - tests/watch-rules.test.ts
    - README.md
    - examples/README.md
    - examples/rules/global/
  component_details:
    - component: Global rule authoring contract
      responsibility: Define matcher variants and document how HTTP-global rules are authored under `rules/global` without changing existing domain-rule authoring.
      interfaces:
        - "`ProxyRule.match` (or equivalent matcher type) supports string, RegExp, sync function, and async function variants for HTTP-global rules."
        - "A missing matcher is treated as an always-match global rule unless product direction changes during review."
    - component: Discovery model
      responsibility: Load domain rules exactly as today and enumerate `rules/global` entries as independent global rules with deterministic names/order.
      interfaces:
        - "`discoverPlugins(rulesDir)` returns enough metadata for the registry to distinguish domain rules from global HTTP rules."
        - "Immediate child files/folders inside `rules/global` are treated as separate global rule units."
    - component: Effective HTTP rule resolver
      responsibility: Reconstruct the full request URL, evaluate global matchers asynchronously, and combine matched globals with the resolved domain rule into one request-scoped effective rule.
      interfaces:
        - "Async HTTP-only registry API returning `{ domain, rule, matchedGlobalIds }` or equivalent request-scoped selection metadata."
        - "Existing synchronous `resolve(rawHost)` remains available for domain-only lookup."
    - component: Cross-rule composer
      responsibility: Compose hooks safely across matched globals and the domain rule while preserving short-circuit and body-mutation semantics.
      interfaces:
        - "`onRequest` chain stops on the first returned `StaticResponse`."
        - "`modifyRequestBody` and `modifyResponseBody` chain sequentially across matched globals and the domain rule."
        - "`target`, `resolveTarget`, and `logging` follow a documented precedence rule with the domain rule applied last."
    - component: Runtime integration
      responsibility: Feed the composed effective rule into the existing passthrough/pipeline branches without changing shared proxy concurrency safeguards.
      interfaces:
        - "`handleHttpRequest()` awaits the HTTP resolver before target selection, request-body buffering, and pipeline branching."
  dependencies:
    - component: Discovery model
      relationship: Produces the domain/global rule inventory consumed by the registry.
    - component: Effective HTTP rule resolver
      relationship: Depends on discovery metadata and shared URL reconstruction helpers.
    - component: Runtime integration
      relationship: Consumes the registry’s async effective-rule output and passes it into existing proxy flow control.
    - component: Tests and docs
      relationship: Depend on the final matcher contract, ordering rules, and supported filesystem layout.
  integration_points:
    - HTTP request entry in `src/proxy/http-handler.ts`
    - Rule discovery and hot-reload flow in `src/plugins/discover-plugins.ts`, `src/plugins/plugin-registry.ts`, and `src/watch/watch-config-and-rules.ts`
    - Public rule authoring docs in `README.md` and `examples/README.md`

