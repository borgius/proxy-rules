related_conventions:
  naming_patterns_in_domain: Domain folders are named by hostname (for example `api.example.com`), top-level rule files use the basename as the domain, and runtime code consistently uses `rule` for the resolved `ProxyRule`.
  structure_of_domain: One resolved rules root feeds discovery; discovered rules become a flat registry; runtime handlers perform a single lookup and then execute hook-specific paths.
  error_handling_in_domain: Loader/import/hook errors are logged and generally downgraded to skip/fallback behavior rather than crashing the process.
  testing_in_domain: Tests prefer temporary on-disk rules directories for loader/watch behavior and direct in-memory registry seeding for runtime pipeline behavior.
  documentation_in_domain: README documents hostname-based folder matching and the public `ProxyRule` hook contract.

