plan_id: 20260318-global-rules
objective: add support for global rules stored in rules/global that run for every request if a match passes
focus_area: current rule discovery/loading and how per-domain rules are resolved
created_at: 2026-03-18
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - Rule discovery is centralized in `src/plugins/discover-plugins.ts`: it scans the active `rulesDir`, imports either domain folders or top-level rule files, and merges multi-file domain folders into a single `ProxyRule`.
  - Domain resolution is centralized in `src/plugins/plugin-registry.ts`: requests are normalized via `extractHostname()` + `normalizeHostname()`, then a single `ProxyRule | null` is returned to HTTP, CONNECT, and WebSocket handlers.
  - The narrowest seam for adding `rules/global` with minimal surface-area change is the discovery/registry boundary: preserve handler call sites by keeping `registry.resolve(...)` as the place that yields the effective rule object.
  - Hook composition already has established semantics that must be preserved: ordered async hook chaining, `modifyResponseBody` last-wins during merge, `onRequest` short-circuit via `StaticResponse`, and `resolveTarget` before opening the upstream connection.
  - Existing tests already lock loader, resolver, hot-reload, config-path, CONNECT interception, and response-pipeline behavior; global-rule support would most naturally extend those suites rather than require brand-new harnesses.

research_metadata:
  methodology: hybrid retrieval using semantic_search, grep_search, direct file reads, symbol-usage lookup, and targeted metadata collection for key loader/resolver/runtime files
  scope: focused on rule discovery, registry construction, hostname normalization, runtime rule selection for HTTP/CONNECT/WebSocket, hot reload, and adjacent tests/docs
  confidence: high
  coverage: 92

