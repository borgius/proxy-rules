open_questions:
  - question: What precedence should apply when both a global rule and a domain rule define the same scalar field or hook?
    context: Current merge semantics only describe composition within a single domain folder; there is no existing cross-scope merge policy.
  - question: Should `rules/global` behave as a reserved directory name or as a normal domain entry that is specially handled during discovery?
    context: `discoverPlugins()` currently treats every directory in `rulesDir` as a routable domain name.
  - question: Should CONNECT interception become true when only a global rule exists but no domain-specific rule matches?
    context: `shouldInterceptConnect()` and `handleConnect()` currently treat interception strictly as `registry.resolve(hostname) !== null`.
  - question: Should global hooks run for WebSocket and CONNECT traffic as well as HTTP requests?
    context: The runtime has separate hook families (`onConnect`, `onWebSocketOpen`, `onWebSocketClose`) with distinct call sites.

gaps:
  - area: Global/shared rule model
    description: The current codebase has no built-in concept of a non-domain-scoped rule stored under `rules/global`.
    impact: Any global-rule design will need new semantics at discovery and/or registry resolution time.
  - area: Cross-scope hook ordering coverage
    description: Existing tests cover multi-file intra-domain merging and runtime hooks, but not layered execution across two scopes such as global + domain.
    impact: Hook precedence/order for a global-rule feature is not established by current tests.
  - area: Public documentation for shared rule precedence
    description: README documents only hostname-matched rule folders and single resolved rules.
    impact: User-visible behavior for `rules/global` would need explicit documentation to avoid ambiguity.
