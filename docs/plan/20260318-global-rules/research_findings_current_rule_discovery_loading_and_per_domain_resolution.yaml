patterns_found:
  - category: structure
    pattern: Rules are discovered from one active rules root and emitted as a flat list of domain-to-rule pairs.
    description: `discoverPlugins()` treats each subdirectory as a domain and each top-level JS/TS file as a single-file domain rule; there is no special-case shared/global rule concept today.
    examples:
      - file: src/plugins/discover-plugins.ts
        location: src/plugins/discover-plugins.ts:145-173
        snippet: "discoverPlugins() iterates entries in rulesDir; directories become domains, top-level files become basename domains."
      - file: README.md
        location: README.md:132-145
        snippet: "Rules are matched by normalising the requested hostname and looking up a matching folder under the active rules directory."
    prevalence: common

  - category: architecture
    pattern: Runtime consumers depend on a single registry lookup that returns one effective `ProxyRule`.
    description: HTTP, CONNECT, and WebSocket handlers do not perform their own file or folder resolution; they all ask `PluginRegistry.resolve(...)` for the active rule.
    examples:
      - file: src/proxy/http-handler.ts
        location: src/proxy/http-handler.ts:41
        snippet: "const rule = registry.resolve(rawHost);"
      - file: src/proxy/connect-handler.ts
        location: src/proxy/connect-handler.ts:316
        snippet: "const rule = registry.resolve(hostname);"
      - file: src/proxy/websocket-handler.ts
        location: src/proxy/websocket-handler.ts:27
        snippet: "const rule = registry.resolve(rawHost);"
    prevalence: common

  - category: architecture
    pattern: Hook composition semantics are defined during discovery-time merge, not at request time.
    description: Multi-file domain folders are merged once; scalar fields (`target`, `priority`) use last-wins, `logging` shallow-merges, async hooks chain in order, and `modifyResponseBody` uses last-wins semantics.
    examples:
      - file: src/plugins/discover-plugins.ts
        location: src/plugins/discover-plugins.ts:53-105
        snippet: "mergeRules() composes onRequest/onResponse/onConnect/onWebSocket* and lets the last modifyResponseBody win."
      - file: src/plugins/discover-plugins.ts
        location: src/plugins/discover-plugins.ts:120-138
        snippet: "loadDomainFolder() loads index first, then alphabetical files, then merges them."
    prevalence: common

  - category: architecture
    pattern: Response-body mutation uses a separate isolated proxy path with slightly different hook timing.
    description: When `modifyResponseBody` exists, `handleHttpRequest()` delegates to `runResponsePipeline()`; in that path, `modifyResponseBody` runs before `onResponse`, whereas non-pipeline requests only run `onResponse` on upstream response arrival.
    examples:
      - file: src/proxy/http-handler.ts
        location: src/proxy/http-handler.ts:105-108
        snippet: "if (rule?.modifyResponseBody) { runResponsePipeline(...); return; }"
      - file: src/proxy/response-pipeline.ts
        location: src/proxy/response-pipeline.ts:228-253
        snippet: "modifyResponseBody executes, then optional onResponse, then final response is written."
    prevalence: occasional

  - category: testing
    pattern: Rule-loading behavior is verified with temporary rules directories and live registry replacement.
    description: Tests already create temp rule trees, write `index.js`, reload discovery, and assert registry resolution/hot reload behavior.
    examples:
      - file: tests/plugins.test.ts
        location: tests/plugins.test.ts:41-84
        snippet: "write rule file, call discoverPlugins(), rewrite file, call discoverPlugins() again, assert updated module contents."
      - file: tests/watch-rules.test.ts
        location: tests/watch-rules.test.ts:52-85
        snippet: "watchRules() reloads registry after the file changes without restart."
    prevalence: common

