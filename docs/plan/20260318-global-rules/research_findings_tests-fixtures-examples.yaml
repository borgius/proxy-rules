patterns_found:
  - category: structure
    pattern: Domain-by-path authoring
    description: Rules are authored as one module per domain folder (`rules/<domain>/index.(js|ts)`) or top-level domain-named files; the filesystem name is the matching key.
    examples:
      - file: README.md
        location: README.md:130
        snippet: Rules are matched by normalising the requested hostname and looking up a matching folder under the active rules directory.
      - file: tests/plugins.test.ts
        location: tests/plugins.test.ts:28
        snippet: Fixture discovery asserts `httpbin.org`, `api.example.com`, `json.example.com`, `monitored.internal`.
      - file: src/plugins/discover-plugins.ts
        location: src/plugins/discover-plugins.ts:103
        snippet: Supports `rules/example.com/index.ts` and top-level single files where basename becomes the domain.
    prevalence: common

  - category: architecture
    pattern: Hook-oriented `ProxyRule` modules with default export
    description: Every example and fixture exports a single `rule` object typed as `ProxyRule`, then fills in optional hooks.
    examples:
      - file: examples/rules/api.example.com/index.js
        location: examples/rules/api.example.com/index.js:12
        snippet: /** @type {import('proxy-rules/types').ProxyRule} */ const rule = { ... }; export default rule;
      - file: tests/fixtures/proxy-rules/rules/api.example.com/index.ts
        location: tests/fixtures/proxy-rules/rules/api.example.com/index.ts:7
        snippet: const rule: ProxyRule = { ... }; export default rule;
      - file: README.md
        location: README.md:134
        snippet: Minimal example shows a default-exported `ProxyRule` object.
    prevalence: common

  - category: naming
    pattern: Matching semantics are currently hostname normalization plus optional priority
    description: Public docs and tests expose exact-domain lookup, port stripping, ignored-subdomain normalization, and `priority`; no current `match` property is documented or exercised.
    examples:
      - file: tests/plugins.test.ts
        location: tests/plugins.test.ts:98
        snippet: Registry tests cover exact domain, host with port, ignored `www`, and unknown host.
      - file: src/plugins/plugin-registry.ts
        location: src/plugins/plugin-registry.ts:58
        snippet: `resolve` extracts hostname, normalizes it, then performs exact candidate lookup.
      - file: src/plugins/types.ts
        location: src/plugins/types.ts:246
        snippet: `priority?: number` is the only documented matching-related field beyond target/hook behavior.
    prevalence: common

  - category: testing
    pattern: Tests separate selection/discovery from runtime hook execution
    description: File-system and registry semantics are covered in `plugins.test.ts`/`watch-rules.test.ts`/`config.test.ts`, while hook behavior after selection is covered by `response-pipeline.test.ts`.
    examples:
      - file: tests/plugins.test.ts
        location: tests/plugins.test.ts:88
        snippet: `PluginRegistry.resolve` tests selection behavior.
      - file: tests/watch-rules.test.ts
        location: tests/watch-rules.test.ts:59
        snippet: Watcher test verifies live replacement of authored rule files.
      - file: tests/response-pipeline.test.ts
        location: tests/response-pipeline.test.ts:118
        snippet: Integration tests validate body hook execution once the rule is active.
    prevalence: common

  - category: documentation
    pattern: Examples focus on per-domain capabilities, not cross-domain/global selection
    description: Shipped examples explain static responses, target resolution, header/body mutation, and logging-only rules, all anchored to domain-specific folders.
    examples:
      - file: examples/README.md
        location: examples/README.md:12
        snippet: Example catalog is entirely domain folder based.
      - file: examples/rules/gateway.example.com/index.js
        location: examples/rules/gateway.example.com/index.js:25
        snippet: `resolveTarget` is shown as the advanced selector users have today.
      - file: examples/rules/mock-api.example.com/index.js
        location: examples/rules/mock-api.example.com/index.js:24
        snippet: Full static mocks are still tied to a single domain folder.
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: discoverPlugins
      responsibility: Scans rules directory, imports rule modules, and derives domain names from file/folder paths.
      location: src/plugins/discover-plugins.ts
      relationship_to_domain: domain fixtures/examples feed directly into this loader
    - component: PluginRegistry
      responsibility: Normalizes hostnames, orders entries by priority, and resolves the active rule.
      location: src/plugins/plugin-registry.ts
      relationship_to_domain: tests asserting matching semantics target this class directly
    - component: loadConfig
      responsibility: Resolves active rules directory from global/project config and CLI overrides.
      location: src/config/load-config.ts
      relationship_to_domain: fixture config and config tests define where authored rules are discovered from
    - component: response pipeline / http handler
      responsibility: Executes hook methods on the selected rule during request and response handling.
      location: src/proxy/response-pipeline.ts and src/proxy/http-handler.ts
      relationship_to_domain: end-to-end tests verify authored hook behavior after selection succeeds
  interfaces_used_by_domain:
    - interface: ProxyRule
      location: src/plugins/types.ts
      usage_pattern: Example and fixture modules implement optional hook properties plus `target`, `resolveTarget`, `logging`, and `priority`
  data_flow_involving_domain: Config selects `rulesDir` -> discovery imports domain-scoped modules from filesystem -> registry stores `{domain, rule, priority}` entries -> incoming host header is normalized/exact-matched -> selected rule hooks run in HTTP/response pipeline.
  key_relationships_to_domain:
    - from: tests/fixtures/proxy-rules/rules/*
      to: src/plugins/discover-plugins.ts
      relationship: imported-by
    - from: src/plugins/discover-plugins.ts
      to: src/plugins/plugin-registry.ts
      relationship: provides discovered plugin entries
    - from: tests/plugins.test.ts
      to: src/plugins/discover-plugins.ts
      relationship: tests
    - from: tests/plugins.test.ts
      to: src/plugins/plugin-registry.ts
      relationship: tests
    - from: tests/response-pipeline.test.ts
      to: src/proxy/http-handler.ts
      relationship: tests

