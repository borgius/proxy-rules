    - hostname normalization and exact-domain resolution
    - rules directory selection through config merging
    - watch-based hot reload of updated rule modules
    - end-to-end response-body hook execution through a real proxy
  test_organization: Tests are grouped by subsystem (`plugins`, `watch-rules`, `config`, `response-pipeline`) rather than by individual hook type alone.
  mock_patterns:
