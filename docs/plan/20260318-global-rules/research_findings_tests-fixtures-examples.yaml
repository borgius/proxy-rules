plan_id: 20260318-global-rules
objective: add global rules support plus matching semantics
focus_area: tests-fixtures-examples
created_at: '2026-03-18T00:00:00Z'
created_by: GitHub Copilot (GPT-5.4)
status: completed

tldr: |
  - Current authored rules are domain-addressed by file/folder name; examples and fixtures consistently use `rules/<domain>/index.(js|ts)` plus `export default rule`.
  - Existing test coverage is strongest around discovery/registry resolution (`tests/plugins.test.ts`), config/rules path resolution (`tests/config.test.ts`), hot reload (`tests/watch-rules.test.ts`), and end-to-end hook execution after a rule is selected (`tests/response-pipeline.test.ts`).
  - There is no current `match` authoring surface in examples, fixtures, or `ProxyRule` docs; the visible authoring selectors today are domain naming, `resolveTarget`, and optional `priority`.
  - The docs most likely affected by global rules are `README.md` Rule plugins sections and `examples/README.md`, plus at least one new example folder/file showing non-domain-scoped matching.

research_metadata:
  methodology: hybrid retrieval using semantic_search + grep_search, followed by targeted read_file examination of tests, fixtures, examples, and registry/discovery/types files; lightweight terminal metadata for line counts
  scope: focused review of rule authoring evidence in tests, fixtures, examples, and adjacent loader/registry/docs references needed to place new coverage accurately
  confidence: high
  coverage: 92

