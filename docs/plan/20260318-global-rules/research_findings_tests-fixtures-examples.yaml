related_conventions:
  naming_patterns_in_domain: Domain folders and files use literal hostnames (`api.example.com`, `httpbin.org`, `monitored.internal`); examples name one folder per scenario/capability but still keep the hostname-shaped directory.
  structure_of_domain: Examples and fixtures use a single `index.js`/`index.ts` exporting `rule`; multi-module composition is documented in `README.md` but not represented in the test fixtures reviewed here.
  error_handling_in_domain: Rule examples typically return `undefined` to preserve passthrough behavior on non-matching content types or parse failures; tests assert null/no-rule outcomes rather than throwing for unknown domains.
  testing_in_domain: Selection and discovery are asserted with filesystem fixtures and temp dirs; hook behavior is asserted separately with direct in-memory rules or live proxy requests.
  documentation_in_domain: User-facing docs mirror shipped example folders and explain hooks with copy-paste snippets tied to domain-specific rule paths.

