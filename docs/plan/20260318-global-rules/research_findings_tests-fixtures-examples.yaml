open_questions:
  - question: What filesystem shape will identify a global rule?
    context: All current fixtures/examples rely on domain-derived names from folder/file paths; the loader and docs do not expose a non-domain naming convention today.
  - question: How should `match` interact with existing exact-domain lookup and `priority` ordering?
    context: Registry tests and type docs already encode exact candidate lookup plus optional priority, but no current examples/tests define multi-match precedence rules.
  - question: Will async function matchers be supported during registry resolution time, request handling time, or both?
    context: Existing rule async support is documented for hooks and `resolveTarget`, but resolution tests are synchronous today.
  - question: Should multi-module composition apply to global rules as well?
    context: `README.md` documents alphabetical composition inside domain folders, but fixtures do not currently exercise that pattern.

gaps:
  - area: explicit global rule examples
    description: No shipped example or fixture demonstrates a rule that is not keyed by a literal domain path.
    impact: Matching semantics for global rules are undocumented by example today.
  - area: match-field coverage
    description: No current test, fixture, or public doc uses a `match` property or equivalent declarative matcher.
    impact: New match variants will require new ground-truth examples and selection tests rather than extension of an existing pattern.
  - area: multi-rule precedence coverage
    description: Current tests cover one resolved rule at a time and priority storage, but not multiple simultaneously matching rules.
    impact: Hidden precedence behaviors for global + domain-specific rules are currently unpinned by tests.
